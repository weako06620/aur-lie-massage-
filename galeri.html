<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galerie — Aurélie Massage</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    .gallery-hero {
      padding: 5rem 4rem 3rem;
      background: var(--warm-white);
      text-align: center;
    }
    .gallery-hero .section-tag {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      font-family: var(--font-body);
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .gallery-hero .section-tag::before,
    .gallery-hero .section-tag::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--gold);
    }
    .gallery-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: var(--dark);
      margin: 0;
    }
    .gallery-hero h1 em { font-style: italic; color: var(--forest); }

    .gallery-section {
      padding: 2rem 3rem 6rem;
      background: var(--warm-white);
    }
    .gallery-masonry {
      columns: 3;
      column-gap: 10px;
    }
    @media (max-width: 900px) {
      .gallery-masonry { columns: 2; }
      .gallery-section { padding: 1.5rem 1.5rem 4rem; }
      .gallery-hero { padding: 4rem 1.5rem 2rem; }
    }
    @media (max-width: 480px) {
      .gallery-masonry { columns: 1; }
      .gallery-section { padding: 1rem 1rem 3rem; }
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 10px;
      overflow: hidden;
      border-radius: 4px;
      cursor: zoom-in;
      position: relative;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
    }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(44,74,62,0);
      transition: background 0.3s ease;
    }
    .gallery-item:hover::after { background: rgba(44,74,62,0.12); }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,18,14,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-prev, .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.8rem;
      padding: .5rem 1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .lightbox-prev:hover, .lightbox-next:hover { background: rgba(255,255,255,0.2); }
    .lightbox-prev { left: 1rem; }
    .lightbox-next { right: 1rem; }
  </style>
</head>
<body>

  <nav class="nav" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Aurélie <span>Massage</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="aboutme.html">Soins</a></li>
        <li><a href="tarrif.html">Tarifs</a></li>
        <li><a href="galeri.html" class="active">Galerie</a></li>
      </ul>
      <div class="nav-contact">
        <a href="tel:0698895931" aria-label="Téléphone">📞</a>
        <a href="https://wa.me/33698895931" aria-label="WhatsApp">💬</a>
        <a href="https://www.facebook.com/people/Aur%C3%A9-Lie/pfbid02RkB1vqd2vrL55XC4V5RMW2MaSUFVGfbzSLNtK18XadEy2tCaWXRJD3E9CqpzTJnul/" aria-label="Facebook">📘</a>
      </div>
    </div>
  </nav>

  <section class="gallery-hero">
    <div class="section-tag">Moments de bien-être</div>
    <h1>La galerie <em>d'Aurélie</em></h1>
  </section>

  <section class="gallery-section">
    <div class="gallery-masonry" id="galleryGrid">
      <div class="gallery-item" data-index="0"><img src="image/galerie_1.jpg" alt="Massage en plein air" loading="lazy" /></div>
      <div class="gallery-item" data-index="1"><img src="image/galerie_2.jpg" alt="Massage relaxant" loading="lazy" /></div>
      <div class="gallery-item" data-index="2"><img src="image/galerie_3.jpg" alt="Massage des pieds" loading="lazy" /></div>
      <div class="gallery-item" data-index="3"><img src="image/galerie_4.jpg" alt="Soins naturels" loading="lazy" /></div>
      <div class="gallery-item" data-index="4"><img src="image/galerie_5.jpg" alt="Séance en nature" loading="lazy" /></div>
      <div class="gallery-item" data-index="5"><img src="image/galerie_6.jpg" alt="Table de massage nature" loading="lazy" /></div>
      <div class="gallery-item" data-index="6"><img src="image/galerie_7.jpg" alt="Espace de soin" loading="lazy" /></div>
      <div class="gallery-item" data-index="7"><img src="image/galerie_8.jpg" alt="Soin en forêt" loading="lazy" /></div>
    </div>
  </section>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-prev" id="lbPrev">‹</button>
    <img src="" alt="" id="lbImg" />
    <button class="lightbox-next" id="lbNext">›</button>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-logo">Aurélie <span>Massage</span></div>
        <p class="footer-tagline">Le bien-être au naturel</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Accueil</a>
        <a href="aboutme.html">Soins</a>
        <a href="tarrif.html">Tarifs</a>
        <a href="galeri.html">Galerie</a>
      </div>
      <div class="footer-contact">
        <a href="tel:0698895931">06 98 89 59 31</a>
        <a href="https://wa.me/33698895931">WhatsApp</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2024 Aurélie Massage — Praticienne depuis 2004</p>
    </div>
  </footer>

  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    const images = Array.from(document.querySelectorAll('.gallery-item img')).map(img => img.src);
    let current = 0;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');

    function openLb(index) {
      current = index;
      lbImg.src = images[current];
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      lb.classList.remove('active');
      document.body.style.overflow = '';
    }
    function prev() { current = (current - 1 + images.length) % images.length; lbImg.src = images[current]; }
    function next() { current = (current + 1) % images.length; lbImg.src = images[current]; }

    document.querySelectorAll('.gallery-item').forEach((item, i) => item.addEventListener('click', () => openLb(i)));
    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbPrev').addEventListener('click', prev);
    document.getElementById('lbNext').addEventListener('click', next);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });
  </script>
</body>
</html>
